<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#064E3B"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" rx="16" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="white" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="128" x2="1280" y2="128"/><line x1="0" y1="256" x2="1280" y2="256"/>
    <line x1="0" y1="384" x2="1280" y2="384"/><line x1="0" y1="512" x2="1280" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="640"/><line x1="512" y1="0" x2="512" y2="640"/>
    <line x1="768" y1="0" x2="768" y2="640"/><line x1="1024" y1="0" x2="1024" y2="640"/>
  </g>
  <!-- Upgrade arrow icon -->
  <g transform="translate(640, 240)" fill="none" stroke="white" stroke-width="4" opacity="0.9">
    <!-- Box base -->
    <rect x="-44" y="-10" width="88" height="60" rx="6" fill="white" fill-opacity="0.15"/>
    <rect x="-44" y="-10" width="88" height="60" rx="6"/>
    <!-- Arrow up -->
    <line x1="0" y1="30" x2="0" y2="-60" stroke-linecap="round"/>
    <polyline points="-20,-40 0,-60 20,-40" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Small server lines -->
    <line x1="-24" y1="10" x2="24" y2="10" opacity="0.5"/>
    <line x1="-24" y1="26" x2="24" y2="26" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="640" y="380" text-anchor="middle" fill="white" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="bold">homebrew-mcp-upgrade</text>
  <!-- Subtitle -->
  <text x="640" y="430" text-anchor="middle" fill="white" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" opacity="0.8">Homebrew tap for mcp-upgrade</text>
  <!-- Decorative dots -->
  <g fill="white" opacity="0.1">
    <circle cx="100" cy="100" r="5"/><circle cx="130" cy="100" r="5"/><circle cx="160" cy="100" r="5"/>
    <circle cx="100" cy="130" r="5"/><circle cx="130" cy="130" r="5"/><circle cx="160" cy="130" r="5"/>
    <circle cx="100" cy="160" r="5"/><circle cx="130" cy="160" r="5"/><circle cx="160" cy="160" r="5"/>
    <circle cx="1120" cy="480" r="5"/><circle cx="1150" cy="480" r="5"/><circle cx="1180" cy="480" r="5"/>
    <circle cx="1120" cy="510" r="5"/><circle cx="1150" cy="510" r="5"/><circle cx="1180" cy="510" r="5"/>
    <circle cx="1120" cy="540" r="5"/><circle cx="1150" cy="540" r="5"/><circle cx="1180" cy="540" r="5"/>
  </g>
</svg>
